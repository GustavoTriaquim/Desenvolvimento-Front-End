<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Catálogo de Filmes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-main">
      <section class="auth-card">
        <div class="auth-copy">
          <p class="eyebrow">Projeto didático</p>
          <h1>Login no catálogo de filmes</h1>
          <p>Agora a tela já está preparada para validação com JavaScript.</p>
          <ul class="auth-list">
            <li>Validação front-end dos campos</li>
            <li>Feedback visual de erro</li>
            <li>Base pronta para integração com o Flask</li>
          </ul>
        </div>

        <form id="loginForm" class="auth-form" novalidate>
          <label>
            <span>Usuário</span>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Digite o usuário"
            />
            <small class="field-error" id="usernameError"></small>
          </label>
          <label>
            <span>Senha</span>
            <input
              type="text"
              id="password"
              name="password"
              placeholder="Digite a senha"
            />
            <small class="field-error" id="passwordError"></small>
          </label>

          <button class="button primary auth-button" type="submit">
            Entrar
          </button>
          <p id="loginFeedback" class="form-feedback"></p>
        </form>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
